<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <title>24/7 Star Parking</title>

    <!-- Conexión archivo CSS -->
    <link rel="stylesheet" href="style.css">

</head>

<body>

    <!-- Título principal sistema -->
    <h1>24/7 Star Parking</h1>

    <!-- Descripción sistema -->
    <p>Sistema inteligente de gestión de parqueadero</p>

    <!-- Formulario registro vehículos -->
    <form>

        <!-- Campo placa -->
        <label>Placa vehículo</label>
        <input type="text" placeholder="Ingrese placa">

        <br><br>

        <!-- Campo tipo vehículo -->
        <label>Tipo vehículo</label>

        <select>

            <option>Automóvil</option>
            <option>Moto</option>
            <option>Camioneta</option>

        </select>

        <br><br>

        <!-- Botón registro -->
        <button type="submit">

            Registrar Vehículo

        </button>

    </form>

    <!-- Conexión archivo JavaScript -->
    <script src="app.js"></script>

</body>

</html>
