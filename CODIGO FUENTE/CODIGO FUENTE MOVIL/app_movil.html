<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SENA Star Parking - Operario Móvil</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, Arial, sans-serif; margin: 0; background: #111; color: white; padding: 15px; }
        .app-container { max-width: 360px; margin: 20px auto; background: #222; border-radius: 25px; padding: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); border: 2px solid #333; }
        h1 { font-size: 22px; text-align: center; color: #ffc107; margin-bottom: 5px; }
        .status-badge { background: #28a745; color: white; text-align: center; padding: 12px; border-radius: 10px; font-weight: bold; margin-bottom: 20px; font-size: 16px; }
        input { width: 100%; padding: 12px; box-sizing: border-box; border-radius: 8px; border: none; font-size: 16px; background: #333; color: white; margin-bottom: 15px; }
        button { width: 100%; padding: 12px; background: #ffc107; color: black; font-weight: bold; border-radius: 8px; border: none; font-size: 16px; cursor: pointer; }
        .log-box { background: #000; height: 130px; border-radius: 8px; padding: 10px; font-family: monospace; font-size: 11px; overflow-y: auto; color: #00ff00; border: 1px solid #333; margin-top: 15px; }
    </style>
</head>
<body>

    <div class="app-container">
        <h1>📱 Star Parking Mobile</h1>
        <p style="text-align:center; font-size:12px; color:#aaa; margin-top:0;">Módulo Operario de Patio - Urrao</p>
        
        <div class="status-badge" id="monitorMovil">Celdas Libres: 20</div>

        <div style="margin-top: 10px;">
            <label style="font-size: 12px; color: #aaa; display:block; margin-bottom:5px;">DIGITAR O ESCANEAR PLACA</label>
            <input type="text" id="placaMovil" placeholder="Ej. ABC123">
            <button onclick="registrarEntradaRemota()">Entrada Rápida Móvil ⚡</button>
        </div>

        <div class="log-box" id="consolaMovil">> Canal de red local sincronizado con Taquilla...</div>
    </div>

    <script>
        const CAPACIDAD_MAXIMA = 20;

        function obtenerDatos() {
            return JSON.parse(localStorage.getItem('parqueadero_db')) || [];
        }

        function guardarDatos(data) {
            localStorage.setItem('parqueadero_db', JSON.stringify(data));
            actualizarVistaM();
        }

        function actualizarVistaM() {
            let db = obtenerDatos();
            let libres = CAPACIDAD_MAXIMA - db.length;
            document.getElementById("monitorMovil").innerText = "Celdas Libres: " + libres;
            
            if(libres <= 0) {
                document.getElementById("monitorMovil").style.backgroundColor = "#d9534f";
            } else {
                document.getElementById("monitorMovil").style.backgroundColor = "#28a745";
            }
        }

        function registrarEntradaRemota() {
            let input = document.getElementById("placaMovil");
            let placa = input.value.trim().toUpperCase();

            if(!placa) return alert("Escriba una placa");
            let db = obtenerDatos();
            if(db.length >= CAPACIDAD_MAXIMA) return alert("Parqueadero lleno");

            db.push({ placa: placa, tipo: "Automóvil", ingreso: new Date().getTime(), origen: "MÓVIL" });
            guardarDatos(db);

            document.getElementById("consolaMovil").innerHTML += `<br>> Transmisión exitosa Placa: ${placa}`;
            input.value = "";
        }

        // ESCUCHA EN TIEMPO REAL SI LA WEB HACE ENTRADAS O SALIDAS
        window.addEventListener('storage', (e) => {
            if (e.key === 'parqueadero_db') {
                actualizarVistaM();
                let nuevoDb = JSON.parse(e.newValue) || [];
                let viejoDb = JSON.parse(e.oldValue) || [];
                
                if(nuevoDb.length < viejoDb.length) {
                    document.getElementById("consolaMovil").innerHTML += `<br>> [REDUCCIÓN] Celda liberada desde Taquilla.`;
                } else if(nuevoDb.length > viejoDb.length) {
                    let ult = nuevoDb[nuevoDb.length - 1];
                    if(ult.origen === "WEB") {
                        document.getElementById("consolaMovil").innerHTML += `<br>> [ALERTA] Entrada web de ${ult.placa} en taquilla.`;
                    }
                }
            }
        });

        // Cargar estado inicial
        actualizarVistaM();
    </script>
</body>
</html>
