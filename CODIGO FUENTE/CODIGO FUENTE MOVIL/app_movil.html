<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>24/7 Star Parking - Operario de Patio</title>
    <style>
        :root {
            --primary-color: #2563eb;
            --success-color: #16a34a;
            --danger-color: #dc2626;
            --background: #f8fafc;
            --text-color: #1e293b;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--background);
            color: var(--text-color);
            margin: 0;
            padding: 15px;
            display: flex;
            justify-content: center;
        }

        .container-movil {
            width: 100%;
            max-width: 400px;
            background: #ffffff;
            border-radius: 16px;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
            padding: 20px;
            box-sizing: border-box;
        }

        .header-app {
            text-align: center;
            border-bottom: 2px solid #f1f5f9;
            padding-bottom: 15px;
            margin-bottom: 20px;
        }

        .header-app h2 {
            margin: 0;
            color: var(--primary-color);
            font-size: 1.5rem;
        }

        .header-app p {
            margin: 5px 0 0 0;
            color: #64748b;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            font-size: 0.9rem;
        }

        .input-control {
            width: 100%;
            padding: 12px;
            border: 2px solid #cbd5e1;
            border-radius: 8px;
            font-size: 1.1rem;
            box-sizing: border-box;
            text-transform: uppercase;
            font-weight: bold;
            text-align: center;
            letter-spacing: 2px;
            transition: border-color 0.2s;
        }

        .input-control:focus {
            outline: none;
            border-color: var(--primary-color);
        }

        select.input-control {
            letter-spacing: normal;
            text-align-last: center;
        }

        .btn-submit {
            width: 100%;
            background-color: var(--success-color);
            color: white;
            border: none;
            padding: 14px;
            font-size: 1.1rem;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            transition: background-color 0.2s;
            box-shadow: 0 4px 6px -1px rgba(22, 163, 74, 0.2);
        }

        .btn-submit:active {
            background-color: #15803d;
            transform: scale(0.98);
        }

        .footer-status {
            text-align: center;
            margin-top: 25px;
            font-size: 0.8rem;
            color: #94a3b8;
            border-top: 1px solid #f1f5f9;
            padding-top: 15px;
        }
    </style>
</head>
<body>

    <div class="container-movil">
        <div class="header-app">
            <h2>24/7 Star Parking</h2>
            <p>📱 Módulo Operario de Patio</p>
        </div>

        <div class="form-group">
            <label for="placaIngreso">PLACA DEL VEHÍCULO</label>
            <input type="text" id="placaIngreso" class="input-control" maxlength="6" placeholder="EJ: KJU852" autocomplete="off">
        </div>

        <div class="form-group">
            <label for="tipoVehiculo">TIPO DE VEHÍCULO</label>
            <select id="tipoVehiculo" class="input-control">
                <option value="Moto">🏍️ MOTO</option>
                <option value="Carro">🚗 CARRO</option>
            </select>
        </div>

        <button type="button" class="btn-submit" onclick="registrarEntradaMovil()">
            📥 REGISTRAR ENTRADA
        </button>

        <div class="footer-status">
            Conexión local directa mediante LocalStorage Bus • Activo
        </div>
    </div>

    <script>
        // Capacidad máxima mapeada con la Taquilla Central
        const TOTAL_CUPOS_MOVIL = 20;

        // Recuperar la base de datos local o inicializarla si no existe
        let dbVehiculos = JSON.parse(localStorage.getItem('parqueadero_db')) || [];

        function registrarEntradaMovil() {
            // Capturar el valor, limpiar espacios en blanco y convertir a mayúsculas estrictas
            const placaInput = document.getElementById('placaIngreso').value.trim().toUpperCase();
            const tipoVehiculo = document.getElementById('tipoVehiculo').value;

            // CASO CP-02: Control de datos nulos o vacíos
            if (!placaInput) {
                alert("🚨 MÓVIL: ¡La placa es obligatoria para registrar el ingreso!");
                return;
            }

            // CASO CP-03: Validación perimetral por longitud (Caja Negra)
            if (placaInput.length > 6) {
                alert("🚨 MÓVIL: Formato de placa inválido (Máximo 6 caracteres).");
                return;
            }

            // CASO CP-04: Validación por expresiones regulares para evitar caracteres especiales corruptos
            const regexAlfaNumerico = /^[A-Z0-7]+$/; 
            if (!regexAlfaNumerico.test(placaInput)) {
                alert("🚨 MÓVIL: La placa solo puede contener letras y números estándar. Símbolos prohibidos.");
                return;
            }

            // Control adicional: Evitar ingresar una placa que ya se encuentra estacionada
            if (dbVehiculos.some(v => v.placa === placaInput)) {
                alert("⚠️ MÓVIL: Este vehículo ya se encuentra registrado dentro del parqueadero.");
                return;
            }

            // CASO CP-07: Control de desbordamiento de aforo en patio
            if (dbVehiculos.length >= TOTAL_CUPOS_MOVIL) {
                alert("🛑 MÓVIL: Parqueadero saturado. No hay cupos disponibles en el sistema.");
                return;
            }

            // Construcción del objeto de negocio estructurado
            const nuevoVehiculo = {
                placa: placaInput,
                tipo: tipoVehiculo,
                horaIngreso: new Date().getTime() // Marca de tiempo síncrona en milisegundos
            };

            // Inyección al array en memoria de la sesión
            dbVehiculos.push(nuevoVehiculo);

            // Persistencia inmediata en disco duro local (Esto dispara el evento para la taquilla web)
            localStorage.setItem('parqueadero_db', JSON.stringify(dbVehiculos));
            
            // Confirmación de éxito al operario
            alert(`📱 PATIO: Vehículo [${placaInput}] registrado y enviado con éxito a la Taquilla Central.`);
            
            // Restablecer el campo de texto para el próximo ingreso
            document.getElementById('placaIngreso').value = "";
        }

        // CASO CP-06: Escuchador del Bus de Almacenamiento
        // Si el cajero le da salida a un carro en index.html, la lista del móvil se actualiza sola en memoria
        window.addEventListener('storage', (e) => {
            if (e.key === 'parqueadero_db') {
                dbVehiculos = JSON.parse(e.newValue) || [];
            }
        });
    </script>
</body>
</html>
